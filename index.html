<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pinterest Gallery</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
    }

    /* Pinterest layout */
    #gallery {
      column-count: 4;
      column-gap: 15px;
      margin-top: 20px;
    }

    @media (max-width: 1000px) { #gallery { column-count: 3; } }
    @media (max-width: 700px) { #gallery { column-count: 2; } }
    @media (max-width: 500px) { #gallery { column-count: 1; } }

    .card {
      break-inside: avoid;
      margin-bottom: 15px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .tags {
      padding: 8px;
      font-size: 12px;
      color: #555;
    }

    /* LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 10px;
    }

    #lightboxTags {
      color: white;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>Pinterest Image Gallery</h2>

<input id="imageUrl" placeholder="Direct image URL only">
<input id="tagInput" placeholder="tags: cat, meme">

<button onclick="uploadImage()">Upload</button>

<hr>

<input id="searchInput" placeholder="search tag">
<button onclick="searchImages()">Search</button>
<button onclick="loadAll()">Show All</button>

<div id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox(event)">
  <div>
    <img id="lightboxImg">
    <div id="lightboxTags"></div>
  </div>
</div>

<script>
const API = "https://image-gallery-api.nathaniel-cockroft.workers.dev";

/* ---------------- VALIDATION ---------------- */
function isValidImageUrl(url) {
  return (
    url.startsWith("http") &&
    (
      url.includes(".jpg") ||
      url.includes(".jpeg") ||
      url.includes(".png") ||
      url.includes(".webp") ||
      url.includes("i.ibb.co") ||
      url.includes("i.imgur.com")
    )
  );
}

/* ---------------- UPLOAD ---------------- */
async function uploadImage() {
  let image = document.getElementById("imageUrl").value.trim();

  const tags = document.getElementById("tagInput").value
    .split(",")
    .map(t => t.trim().toLowerCase())
    .filter(Boolean);

  if (!image) {
    alert("Enter image URL");
    return;
  }

  // 🚨 prevent broken data
  image = image.split(" ")[0].trim();

  if (!isValidImageUrl(image)) {
    alert("Please use a DIRECT image link (ends in .jpg/.png or i.ibb/i.imgur)");
    return;
  }

  const payload = { image, tags };

  console.log("UPLOAD:", payload);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      alert("Upload failed");
      return;
    }

    alert("Uploaded!");
    loadAll();

  } catch (e) {
    alert("Cannot reach server");
  }
}

/* ---------------- LOAD ---------------- */
async function loadAll() {
  const res = await fetch(API + "/all");
  const data = await res.json();
  render(data);
}

/* ---------------- SEARCH ---------------- */
async function searchImages() {
  const tag = document.getElementById("searchInput").value.trim();
  const res = await fetch(API + "/search?tag=" + tag);
  const data = await res.json();
  render(data);
}

/* ---------------- RENDER ---------------- */
function render(issues) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  issues.forEach(issue => {
    try {
      const data = JSON.parse(issue.body || "{}");

      const imgUrl = data.image;

      if (!imgUrl) return; // skip broken entries

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = imgUrl;

      img.onerror = () => {
        img.src = "https://via.placeholder.com/300?text=Broken+Image";
      };

      img.onclick = () => openLightbox(data);

      const tags = document.createElement("div");
      tags.className = "tags";
      tags.textContent = (data.tags || []).join(", ");

      card.appendChild(img);
      card.appendChild(tags);

      gallery.appendChild(card);

    } catch (e) {
      console.log("Bad issue skipped");
    }
  });
}

/* ---------------- LIGHTBOX ---------------- */
function openLightbox(data) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightboxImg").src = data.image;
  document.getElementById("lightboxTags").textContent =
    "Tags: " + (data.tags || []).join(", ");
}

function closeLightbox(e) {
  if (e.target.id === "lightbox") {
    document.getElementById("lightbox").style.display = "none";
  }
}

/* ---------------- INIT ---------------- */
loadAll();
</script>

</body>
</html>
