<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pinterest Gallery</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
    }

    #gallery {
      column-count: 4;
      column-gap: 15px;
      margin-top: 20px;
    }

    @media (max-width: 1000px) { #gallery { column-count: 3; } }
    @media (max-width: 700px) { #gallery { column-count: 2; } }
    @media (max-width: 500px) { #gallery { column-count: 1; } }

    .card {
      break-inside: avoid;
      margin-bottom: 15px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      cursor: zoom-in;
    }

    .tags {
      padding: 8px;
      font-size: 12px;
      color: #555;
    }

    .deleteBtn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
    }

    /* FULLSCREEN */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 99999;
      overflow: hidden;
    }

    #lightboxImg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100vw;
      max-height: 100vh;
    }

    #lightboxTags {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>

<body>

<h2>Pinterest Gallery</h2>

<input id="imageUrl" placeholder="Image URL">

<input id="tagInput" placeholder="tags (comma separated)">
<button onclick="uploadImage()">Upload</button>

<hr>

<input id="searchInput" placeholder="search tag (or multiple)">
<button onclick="searchImages()">Search</button>
<button onclick="loadAll()">Show All</button>

<div id="gallery"></div>

<!-- FULLSCREEN -->
<div id="lightbox" onclick="closeLightbox(event)">
  <div id="closeBtn">✖</div>
  <img id="lightboxImg">
  <div id="lightboxTags"></div>
</div>

<script>
const API = "https://image-gallery-api.nathaniel-cockroft.workers.dev";

/* ---------------- TAG NORMALIZER ---------------- */
function cleanTag(tag) {
  return tag
    .trim()
    .toLowerCase()
    .replace(/\s+/g, "_")   // spaces → underscore
    .replace(/[^a-z0-9_]/g, ""); // remove bad chars
}

/* ---------------- URL CLEAN ---------------- */
function cleanImageUrl(url) {
  if (!url) return "";
  url = url.trim().split(" ")[0];

  if (url.includes("imgur.com") && !url.includes("i.imgur.com")) {
    const id = url.split("/").pop();
    return `https://i.imgur.com/${id}.jpg`;
  }

  return url;
}

/* ---------------- UPLOAD ---------------- */
async function uploadImage() {
  let image = document.getElementById("imageUrl").value.trim();

  const tags = document.getElementById("tagInput").value
    .split(",")
    .map(cleanTag)
    .filter(Boolean);

  if (!image) return alert("Enter image URL");

  image = cleanImageUrl(image);

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image, tags })
  });

  loadAll();
}

/* ---------------- SEARCH ---------------- */
async function searchImages() {
  const tags = document.getElementById("searchInput").value
    .split(",")
    .map(cleanTag)
    .filter(Boolean);

  const res = await fetch(API + "/all");
  const data = await res.json();

  const filtered = data.filter(issue => {
    try {
      const d = JSON.parse(issue.body || "{}");
      if (!d.tags) return false;

      // must match ALL searched tags
      return tags.every(t => d.tags.includes(t));

    } catch {
      return false;
    }
  });

  render(filtered);
}

/* ---------------- LOAD ---------------- */
async function loadAll() {
  const res = await fetch(API + "/all");
  const data = await res.json();
  render(data);
}

/* ---------------- RENDER ---------------- */
function render(issues) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  issues.forEach(issue => {
    try {
      const data = JSON.parse(issue.body || "{}");
      if (!data.image) return;

      const card = document.createElement("div");
      card.className = "card";

      const del = document.createElement("button");
      del.className = "deleteBtn";
      del.innerText = "🗑";
      del.onclick = () => deletePost(issue.number);

      const img = document.createElement("img");
      img.src = cleanImageUrl(data.image);
      img.onclick = () => openLightbox(data);

      const tags = document.createElement("div");
      tags.className = "tags";
      tags.textContent = (data.tags || []).join(", ");

      card.appendChild(del);
      card.appendChild(img);
      card.appendChild(tags);

      gallery.appendChild(card);

    } catch {}
  });
}

/* ---------------- DELETE ---------------- */
async function deletePost(id) {
  if (!confirm("Delete this image?")) return;

  await fetch(API, {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  loadAll();
}

/* ---------------- FULLSCREEN ---------------- */
function openLightbox(data) {
  document.getElementById("lightbox").style.display = "block";
  document.getElementById("lightboxImg").src = cleanImageUrl(data.image);

  document.getElementById("lightboxTags").textContent =
    "Tags: " + (data.tags || []).join(", ");
}

function closeLightbox(e) {
  if (e.target.id === "lightbox" || e.target.id === "closeBtn") {
    document.getElementById("lightbox").style.display = "none";
  }
}

loadAll();
</script>

</body>
</html>
