<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pinterest Image Gallery</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 { margin-bottom: 10px; }

    input {
      padding: 8px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
    }

    /* Pinterest grid */
    #gallery {
      column-count: 4;
      column-gap: 15px;
      margin-top: 20px;
    }

    @media (max-width: 1000px) { #gallery { column-count: 3; } }
    @media (max-width: 700px) { #gallery { column-count: 2; } }
    @media (max-width: 500px) { #gallery { column-count: 1; } }

    .card {
      break-inside: avoid;
      margin-bottom: 15px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .tags {
      padding: 8px;
      font-size: 12px;
      color: #555;
    }

    /* LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #lightboxContent {
      max-width: 90%;
      max-height: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #lightboxContent img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 10px;
    }

    #lightboxTags {
      margin-top: 10px;
      color: white;
    }
  </style>
</head>

<body>

<h2>Pinterest Image Gallery</h2>

<input id="imageUrl" placeholder="Image URL (ibb.co supported)">
<input id="tagInput" placeholder="tags: cat, meme, cute">

<button onclick="uploadImage()">Upload</button>

<hr>

<input id="searchInput" placeholder="search tag">
<button onclick="searchImages()">Search</button>
<button onclick="loadAll()">Show All</button>

<div id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox(event)">
  <div id="lightboxContent">
    <img id="lightboxImg">
    <div id="lightboxTags"></div>
  </div>
</div>

<script>
const API = "https://image-gallery-api.nathaniel-cockroft.workers.dev";

/* ---------------------------
   AUTO FIX IMAGE URL (ibb)
----------------------------*/
async function fixImageUrl(url) {
  if (!url.includes("ibb.co") || url.includes("i.ibb.co")) {
    return url;
  }

  try {
    const res = await fetch(url);
    const html = await res.text();

    const match = html.match(/https:\/\/i\.ibb\.co\/[^\"]+/);

    if (match) {
      return match[0];
    }

    return url;
  } catch (e) {
    console.log("ibb conversion failed");
    return url;
  }
}

/* ---------------------------
   UPLOAD
----------------------------*/
async function uploadImage() {
  let image = document.getElementById("imageUrl").value.trim();

  const tags = document.getElementById("tagInput").value
    .split(",")
    .map(t => t.trim().toLowerCase())
    .filter(Boolean);

  if (!image) {
    alert("Enter an image URL");
    return;
  }

  image = await fixImageUrl(image);

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image, tags })
  });

  if (res.ok) {
    alert("Uploaded!");
    loadAll();
  } else {
    alert("Upload failed");
  }
}

/* ---------------------------
   LOAD ALL
----------------------------*/
async function loadAll() {
  const res = await fetch(API + "/all");
  const issues = await res.json();
  render(issues);
}

/* ---------------------------
   SEARCH
----------------------------*/
async function searchImages() {
  const tag = document.getElementById("searchInput").value.trim();

  const res = await fetch(API + "/search?tag=" + tag);
  const issues = await res.json();
  render(issues);
}

/* ---------------------------
   RENDER GRID
----------------------------*/
function render(issues) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  issues.forEach(issue => {
    try {
      const data = JSON.parse(issue.body);

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = data.image;

      img.onclick = () => openLightbox(data);

      const tags = document.createElement("div");
      tags.className = "tags";
      tags.textContent = (data.tags || []).join(", ");

      card.appendChild(img);
      card.appendChild(tags);

      gallery.appendChild(card);
    } catch (e) {}
  });
}

/* ---------------------------
   LIGHTBOX
----------------------------*/
function openLightbox(data) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightboxImg").src = data.image;
  document.getElementById("lightboxTags").textContent =
    "Tags: " + (data.tags || []).join(", ");
}

function closeLightbox(e) {
  if (e.target.id === "lightbox") {
    document.getElementById("lightbox").style.display = "none";
  }
}

/* ---------------------------
   INIT
----------------------------*/
loadAll();
</script>

</body>
</html>
