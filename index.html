<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pinterest Gallery</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
    }

    #gallery {
      column-count: 4;
      column-gap: 15px;
      margin-top: 20px;
    }

    @media (max-width: 1000px) { #gallery { column-count: 3; } }
    @media (max-width: 700px) { #gallery { column-count: 2; } }
    @media (max-width: 500px) { #gallery { column-count: 1; } }

    .card {
      break-inside: avoid;
      margin-bottom: 15px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
    }

    .card img {
      width: 100%;
      display: block;
      cursor: zoom-in;
    }

    .tags {
      padding: 8px;
      font-size: 12px;
      color: #555;
    }

    /* delete button */
    .deleteBtn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
    }

    /* FULLSCREEN OVERLAY */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    #lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
    }

    #lightboxTags {
      color: white;
      margin-top: 10px;
      text-align: center;
    }

    #closeBtn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Pinterest Gallery</h2>

<input id="imageUrl" placeholder="Image URL">
<input id="tagInput" placeholder="tags: cat, meme">
<button onclick="uploadImage()">Upload</button>

<hr>

<input id="searchInput" placeholder="search tag">
<button onclick="searchImages()">Search</button>
<button onclick="loadAll()">Show All</button>

<div id="gallery"></div>

<!-- FULLSCREEN VIEW -->
<div id="lightbox" onclick="closeLightbox(event)">
  <div id="closeBtn">✖</div>
  <img id="lightboxImg">
  <div id="lightboxTags"></div>
</div>

<script>
const API = "https://image-gallery-api.nathaniel-cockroft.workers.dev";

/* ---------------- UPLOAD ---------------- */
async function uploadImage() {
  const image = document.getElementById("imageUrl").value.trim();

  const tags = document.getElementById("tagInput").value
    .split(",")
    .map(t => t.trim().toLowerCase())
    .filter(Boolean);

  if (!image) return alert("Enter image URL");

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image, tags })
  });

  if (!res.ok) return alert("Upload failed");

  loadAll();
}

/* ---------------- LOAD ---------------- */
async function loadAll() {
  const res = await fetch(API + "/all");
  const data = await res.json();
  render(data);
}

/* ---------------- SEARCH ---------------- */
async function searchImages() {
  const tag = document.getElementById("searchInput").value.trim();
  const res = await fetch(API + "/search?tag=" + tag);
  const data = await res.json();
  render(data);
}

/* ---------------- DELETE ---------------- */
async function deletePost(id) {
  if (!confirm("Delete this image?")) return;

  await fetch(API, {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  loadAll();
}

/* ---------------- RENDER ---------------- */
function render(issues) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  issues.forEach(issue => {
    try {
      const data = JSON.parse(issue.body || "{}");

      const card = document.createElement("div");
      card.className = "card";

      // delete button (uses GitHub issue ID)
      const del = document.createElement("button");
      del.className = "deleteBtn";
      del.innerText = "🗑";
      del.onclick = () => deletePost(issue.number);

      const img = document.createElement("img");
      img.src = data.image;
      img.onclick = () => openLightbox(data);

      const tags = document.createElement("div");
      tags.className = "tags";
      tags.textContent = (data.tags || []).join(", ");

      card.appendChild(del);
      card.appendChild(img);
      card.appendChild(tags);

      gallery.appendChild(card);

    } catch (e) {}
  });
}

/* ---------------- FULLSCREEN ---------------- */
function openLightbox(data) {
  const lb = document.getElementById("lightbox");
  lb.style.display = "flex";

  document.getElementById("lightboxImg").src = data.image;
  document.getElementById("lightboxTags").textContent =
    "Tags: " + (data.tags || []).join(", ");
}

function closeLightbox(e) {
  if (e.target.id === "lightbox" || e.target.id === "closeBtn") {
    document.getElementById("lightbox").style.display = "none";
  }
}

/* ---------------- INIT ---------------- */
loadAll();
</script>

</body>
</html>
